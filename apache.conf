<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/clearpay/public

    # Skip ELB health check requests in access log
    SetEnvIf User-Agent "^ELB-HealthChecker" dontlog

    # Logs to stdout/stderr (container-friendly)
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined env=!dontlog

    # BROTLI Compression (Dynamic + Static)
    <IfModule mod_brotli.c>
        # Balanced compression for dynamic content
        BrotliCompressionQuality 5

        # Compress common text-based files
        AddOutputFilterByType BROTLI_COMPRESS text/html text/plain text/xml text/css
        AddOutputFilterByType BROTLI_COMPRESS application/javascript text/javascript
        AddOutputFilterByType BROTLI_COMPRESS application/json application/xml
        AddOutputFilterByType BROTLI_COMPRESS application/rss+xml application/atom+xml
        AddOutputFilterByType BROTLI_COMPRESS application/font-woff application/font-woff2
    </IfModule>

    # GZIP Compression - Fallback
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript text/javascript
        AddOutputFilterByType DEFLATE application/json application/xml
        AddOutputFilterByType DEFLATE application/rss+xml application/atom+xml
        AddOutputFilterByType DEFLATE application/font-woff application/font-woff2

        BrowserMatch ^Mozilla/4 gzip-only-text/html
        BrowserMatch ^Mozilla/4\.0[678] no-gzip
        BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
    </IfModule>

    # Preserve Authorization header (useful for APIs)
    SetEnvIfNoCase Authorization "(.+)" HTTP_AUTHORIZATION=$1

    <Directory /var/www/html/clearpay/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP-FPM via proxy_fcgi
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>
</VirtualHost>